name: Feature request
description: Propose a new feature, connector, or template
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem you're trying to solve?
      description: Describe the user pain, not the feature yet. Who hits this and when?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the fix look like? UI mockups, API shape, or prose — whatever fits.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're worse.
  - type: dropdown
    id: area
    attributes:
      label: Which area of the product?
      options:
        - Agent / chat
        - Entities / schema
        - Dashboards / reports
        - Time tracking
        - Templates
        - Connectors (Fakturoid, Stripe, etc.)
        - Auth / multi-tenancy
        - Self-host / deployment
        - Other
    validations:
      required: true
