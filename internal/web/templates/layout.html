{{define "layout"}}<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{.Title}} · steezr</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --bg: #0b0c0e;
            --fg: #e6e6e6;
            --mute: #8a8a8a;
            --accent: #6ee7b7;
            --line: #1f2024;
            --card: #131418;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--fg);
            font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--line);
        }
        header a { color: var(--fg); text-decoration: none; }
        header .brand { font-weight: 600; letter-spacing: -0.01em; }
        header .brand span { color: var(--accent); }
        main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
        h1 { font-size: 20px; font-weight: 600; margin: 0 0 16px; }
        h2 { font-size: 15px; font-weight: 600; margin: 24px 0 8px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.08em; }
        .card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .card h3 { margin: 0 0 4px; font-size: 15px; }
        .card p { margin: 0; color: var(--mute); font-size: 13px; }
        .card .meta { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
        .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #1c1e24; color: var(--mute); font-size: 11px; font-family: ui-monospace, monospace; }
        form textarea, form input[type=text] {
            width: 100%;
            padding: 12px;
            background: var(--card);
            color: var(--fg);
            border: 1px solid var(--line);
            border-radius: 8px;
            font: inherit;
            resize: vertical;
        }
        form textarea:focus, form input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
        form button {
            padding: 10px 16px;
            background: var(--accent);
            color: #06110b;
            border: 0;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        form button:disabled { opacity: 0.5; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line); }
        th { color: var(--mute); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
        .error { color: #f87171; margin: 8px 0; font-size: 13px; }
        .hint { color: var(--mute); font-size: 12px; }
        .htmx-indicator { display: none; color: var(--mute); font-size: 12px; margin-left: 8px; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.form-busy button { opacity: 0.5; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="brand">steezr<span>_</span></a>
        {{if .Tenant}}<div class="hint">{{.Tenant.Name}}</div>{{end}}
    </header>
    <main>{{template "content" .}}</main>
</body>
</html>
{{end}}
