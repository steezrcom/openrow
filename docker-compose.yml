services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: steezr
      POSTGRES_PASSWORD: steezr
      POSTGRES_DB: steezr_erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steezr -d steezr_erp"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
